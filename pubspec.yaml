name: saatdin
description: "Parametric income insurance for Q-commerce delivery riders."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  intl: ^0.20.2
  http: ^1.2.2
  shared_preferences: ^2.3.3
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - assets/images/logo.png
    - assets/images/gig.png
    - assets/images/swiggy.png
    - assets/images/zepto.png
    - assets/images/Blinkit-yellow-rounded.svg
    - assets/images/zomato-logo-svg-vector_logoshape.png

