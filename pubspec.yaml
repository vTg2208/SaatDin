name: saatdin
description: "Parametric income insurance for Q-commerce delivery riders."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  intl: ^0.20.2
  http: ^1.2.2
  shared_preferences: ^2.3.3
  flutter_svg: ^2.0.10+1
  geolocator: ^13.0.2
  sensors_plus: ^6.1.1
  connectivity_plus: ^6.1.1
  sms_autofill: ^2.4.1
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  open_filex: ^4.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/documents/
    - assets/images/
    - assets/images/onboarding-screens/

