name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    name: Dart Analyzer Guardrail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      # Issue #19 — zero-warning policy.
      # Change --baseline N temporarily when intentionally deferring cleanup.
      - name: Run analyzer guardrail
        run: bash scripts/ci_analyze.sh --baseline 0
